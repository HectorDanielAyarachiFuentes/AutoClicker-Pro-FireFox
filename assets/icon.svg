<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradiente de fondo premium cyber-dark -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#131926" />
      <stop offset="100%" stop-color="#07090e" />
    </radialGradient>
    
    <!-- Gradiente de neón cian/azul para acentos -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Gradiente para el cursor de clic -->
    <linearGradient id="clickGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39d353" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Sombras y Resplandores -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo redondeado suave estilo squircle moderno -->
  <rect x="16" y="16" width="480" height="480" rx="100" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="8"/>

  <!-- Retículo / Target del Selector CSS (Círculos concéntricos glowing) -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#neonGrad)" stroke-width="12" stroke-dasharray="16 10" filter="url(#neonGlow)" />
  <circle cx="256" cy="256" r="80" fill="none" stroke="url(#neonGrad)" stroke-width="6" opacity="0.6" />
  <circle cx="256" cy="256" r="20" fill="url(#neonGrad)" filter="url(#neonGlow)" />

  <!-- Líneas de Cruz de Mira (Crosshairs) -->
  <line x1="256" y1="50" x2="256" y2="100" stroke="url(#neonGrad)" stroke-width="12" stroke-linecap="round" filter="url(#neonGlow)" />
  <line x1="256" y1="412" x2="256" y2="462" stroke="url(#neonGrad)" stroke-width="12" stroke-linecap="round" filter="url(#neonGlow)" />
  <line x1="50" y1="256" x2="100" y2="256" stroke="url(#neonGrad)" stroke-width="12" stroke-linecap="round" filter="url(#neonGlow)" />
  <line x1="412" y1="256" x2="462" y2="256" stroke="url(#neonGrad)" stroke-width="12" stroke-linecap="round" filter="url(#neonGlow)" />

  <!-- Cursor de Clic (Flecha neón verde/esmeralda apuntando al centro) -->
  <g transform="translate(256, 256) rotate(-25)">
    <!-- Ondas de ondas de clic (ondas de choque de velocidad) -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="url(#clickGrad)" stroke-width="4" opacity="0.8" filter="url(#neonGlow)">
      <animate attributeName="r" values="20;90" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0" dur="1.5s" repeatCount="indefinite" />
    </circle>
    
    <!-- El cursor físico -->
    <path d="M 0,0 L 20,80 L -10,65 L -45,95 L -65,75 L -35,45 L -50,20 Z" fill="url(#clickGrad)" stroke="#07090e" stroke-width="6" filter="url(#neonGlow)" />
  </g>
</svg>
