<svg viewBox="2.2 2.2 19.6 19.6" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Degradado Premium del Cursor (Cyberpunk Blue-Cyan) -->
    <linearGradient id="cyberGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0072ff" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
    
    <!-- Filtro de sombra/glow sutil para dar profundidad en barras oscuras y claras -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Ondas / Ondulaciones de Clic (Neon Cyan con borde oscuro para contraste universal) -->
    <!-- Fondo de contraste para los clics en temas claros -->
    <path d="M7 7L5.5 5.5M15 7L16.5 5.5M5.5 16.5L7 15M11 5L11 3M5 11L3 11" 
          stroke="#001830" stroke-width="3.5" stroke-linecap="round" />
    <path d="M7 7L5.5 5.5M15 7L16.5 5.5M5.5 16.5L7 15M11 5L11 3M5 11L3 11" 
          stroke="#00f2fe" stroke-width="2" stroke-linecap="round" />

    <!-- Cursor Principal (Relleno con Degradado Premium y borde oscuro grueso de contraste) -->
    <path d="M17.1603 16.9887L21.0519 15.4659C21.4758 15.3001 21.4756 14.7003 21.0517 14.5346L11.6992 10.8799C11.2933 10.7213 10.8929 11.1217 11.0515 11.5276L14.7062 20.8801C14.8719 21.304 15.4717 21.3042 15.6375 20.8803L17.1603 16.9887Z" 
          fill="url(#cyberGradient)" 
          stroke="#050811" 
          stroke-width="2" 
          stroke-linejoin="round" />
  </g>
</svg>